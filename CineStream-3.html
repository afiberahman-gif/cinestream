<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CineStream</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap');
  .bn { font-family: 'Hind Siliguri', sans-serif; letter-spacing:0.2px; }

  :root {
    --red: #E50914;
    --red2: #B20710;
    --gold: #F5C518;
    --bg: #0A0A0F;
    --surface: #111118;
    --surface2: #1A1A25;
    --surface3: #22222F;
    --border: rgba(255,255,255,0.07);
    --text: #FFFFFF;
    --text2: rgba(255,255,255,0.6);
    --text3: rgba(255,255,255,0.35);
    --radius: 14px;
    --nav-h: 60px;
    --bottom-h: 64px;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    overscroll-behavior: none;
  }

  ::-webkit-scrollbar { width:3px; height:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background: var(--red); border-radius:2px; }

  /* ── APP SHELL ── */
  #app { display:flex; flex-direction:column; height:100vh; }

  /* ── TOP NAV ── */
  .nav {
    flex-shrink:0;
    height: var(--nav-h);
    display:flex;
    align-items:center;
    gap:10px;
    padding: 0 16px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98), rgba(10,10,15,0.85));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    position:relative;
    z-index:50;
  }
  .logo {
    font-size:19px; font-weight:900; letter-spacing:-0.5px;
    background: linear-gradient(135deg, #E50914 0%, #FF4D4D 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    flex-shrink:0;
    white-space:nowrap;
  }
  .logo span { -webkit-text-fill-color: rgba(255,255,255,0.5); font-weight:300; font-size:15px; margin-left:1px; }

  /* SEARCH BAR */
  .search-bar {
    flex:1;
    display:flex; align-items:center; gap:8px;
    background: var(--surface2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:0 12px;
    height:38px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-bar:focus-within {
    border-color: rgba(229,9,20,0.5);
    box-shadow: 0 0 0 3px rgba(229,9,20,0.1);
  }
  .search-bar svg { flex-shrink:0; opacity:0.45; }
  .search-bar input {
    flex:1; background:none; border:none; outline:none;
    color:var(--text); font-family:inherit; font-size:14px;
    min-width:0;
  }
  .search-bar input::placeholder { color:var(--text3); }
  .search-clear {
    background:none; border:none; cursor:pointer;
    color:var(--text3); font-size:16px; display:none; padding:2px;
    flex-shrink:0; line-height:1;
  }

  /* ── SCROLL AREA ── */
  #scrollArea {
    flex:1; overflow-y:auto; overflow-x:hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    padding-bottom: calc(var(--bottom-h) + 8px);
  }

  /* ── HOME SCREEN ── */
  /* HERO BANNER */
  .hero {
    position:relative;
    height: clamp(240px, 52vw, 340px);
    overflow:hidden;
  }
  .hero-bg {
    position:absolute; inset:0;
    background-size:cover; background-position:center 20%;
    transition: opacity 0.8s ease;
  }
  .hero-bg::after {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(180deg,
      rgba(10,10,15,0.25) 0%,
      rgba(10,10,15,0.1) 30%,
      rgba(10,10,15,0.7) 70%,
      rgba(10,10,15,1) 100%
    );
  }
  .hero-badges {
    position:absolute; top:14px; right:14px;
    display:flex; gap:6px; z-index:2;
  }
  .hero-badge {
    background:rgba(0,0,0,0.55); border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    border-radius:6px; padding:3px 8px; font-size:11px; font-weight:700;
    color:#fff; display:flex; align-items:center; gap:4px;
  }
  .hero-badge.hd { background:rgba(229,9,20,0.75); border-color:transparent; }
  .hero-info {
    position:absolute; bottom:0; left:0; right:0; z-index:2;
    padding:0 16px 16px;
  }
  .hero-genre {
    font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--red); margin-bottom:6px;
  }
  .hero-title {
    font-size:clamp(20px,5.5vw,28px); font-weight:900; line-height:1.1;
    margin-bottom:6px; letter-spacing:-0.3px;
  }
  .hero-meta {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--text2); margin-bottom:12px;
  }
  .hero-meta .dot { width:3px; height:3px; border-radius:50%; background:var(--text3); }
  .star-rating { color:var(--gold); font-weight:700; }
  .hero-btns { display:flex; gap:8px; }
  .btn-play {
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    background:var(--red); color:#fff; border:none; border-radius:10px;
    padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer;
    font-family:inherit; transition:background 0.15s, transform 0.1s;
    active:transform: scale(0.97);
  }
  .btn-play:active { transform:scale(0.97); background:var(--red2); }
  .btn-info {
    width:44px; height:44px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.18);
    border-radius:10px; cursor:pointer; flex-shrink:0;
    transition:background 0.15s;
  }
  .btn-info:active { background:rgba(255,255,255,0.18); }
  /* Hero dots */
  .hero-dots {
    position:absolute; bottom:70px; right:16px; z-index:3;
    display:flex; flex-direction:column; gap:4px;
  }
  .h-dot {
    width:3px; height:3px; border-radius:2px;
    background:rgba(255,255,255,0.3); cursor:pointer;
    transition:all 0.25s;
  }
  .h-dot.active { background:var(--red); height:14px; }

  /* SECTION */
  .section { padding:20px 0 0; }
  .section-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 16px; margin-bottom:14px;
  }
  .section-title { font-size:16px; font-weight:800; letter-spacing:-0.2px; }
  .section-more { font-size:12px; color:var(--red); font-weight:600; cursor:pointer; }

  /* HORIZONTAL SCROLL CARDS */
  .h-scroll {
    display:flex; gap:10px;
    overflow-x:auto; padding:0 16px 4px;
    scrollbar-width:none; -webkit-overflow-scrolling:touch;
  }
  .h-scroll::-webkit-scrollbar { display:none; }
  .h-card {
    flex-shrink:0; width:110px; cursor:pointer;
    transition:transform 0.18s;
  }
  .h-card:active { transform:scale(0.95); }
  .h-card-img {
    width:110px; height:165px; border-radius:10px; overflow:hidden;
    background:var(--surface2); position:relative;
    border:1px solid var(--border);
  }
  .h-card-img img { width:100%; height:100%; object-fit:cover; display:block; }
  .h-card-rating {
    position:absolute; bottom:0; left:0; right:0;
    background:linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    padding:14px 6px 5px;
    font-size:10px; font-weight:700; color:var(--gold);
    display:flex; align-items:center; gap:3px;
  }
  .h-card-title {
    margin-top:6px; font-size:11px; font-weight:600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    color:var(--text2);
  }

  /* GENRE CHIPS */
  .genre-row {
    display:flex; gap:7px;
    overflow-x:auto; padding:0 16px 0; margin-bottom:0;
    scrollbar-width:none;
  }
  .genre-row::-webkit-scrollbar { display:none; }
  .chip {
    flex-shrink:0; padding:7px 15px; border-radius:20px;
    border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.05);
    color:var(--text2); font-size:12px; font-weight:600;
    cursor:pointer; white-space:nowrap;
    transition:all 0.18s; font-family:inherit;
  }
  .chip.active { background:var(--red); border-color:var(--red); color:#fff; }

  /* GRID */
  .movie-grid {
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:10px; padding:0 16px;
  }
  .g-card { cursor:pointer; transition:transform 0.18s; }
  .g-card:active { transform:scale(0.95); }
  .g-card-img {
    width:100%; aspect-ratio:2/3; border-radius:10px; overflow:hidden;
    background:var(--surface2); position:relative;
    border:1px solid var(--border);
  }
  .g-card-img img { width:100%; height:100%; object-fit:cover; display:block; }
  .g-card-badge {
    position:absolute; top:5px; left:5px;
    background:rgba(0,0,0,0.65); border-radius:4px;
    padding:2px 5px; font-size:9px; font-weight:700; color:var(--gold);
    display:flex; align-items:center; gap:2px;
  }
  .g-card-title {
    margin-top:5px; font-size:11px; font-weight:600;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .g-card-year { font-size:10px; color:var(--text3); margin-top:2px; }

  /* EMPTY / LOADER */
  .empty-state {
    grid-column:1/-1; text-align:center;
    padding:50px 20px; color:var(--text3);
  }
  .empty-state svg { opacity:0.25; margin-bottom:12px; }
  .empty-state p { font-size:13px; }
  .loader {
    grid-column:1/-1; display:flex; justify-content:center;
    padding:40px 0;
  }
  .spinner {
    width:28px; height:28px; border-radius:50%;
    border:2.5px solid rgba(255,255,255,0.1);
    border-top-color:var(--red);
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* SKELETON */
  .skeleton {
    background:linear-gradient(90deg, var(--surface2) 0%, var(--surface3) 50%, var(--surface2) 100%);
    background-size:200% 100%;
    animation:shimmer 1.4s infinite;
    border-radius:10px;
  }
  @keyframes shimmer { to { background-position:-200% 0; } }

  /* ── SEARCH RESULTS ── */
  #searchView { display:none; }
  .search-header {
    padding:14px 16px 10px;
    font-size:13px; color:var(--text2);
  }
  .search-header b { color:var(--text); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    flex-shrink:0;
    height: var(--bottom-h);
    display:flex; align-items:center;
    background:rgba(10,10,15,0.96);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border);
    padding:0 8px;
    padding-bottom:env(safe-area-inset-bottom, 0px);
  }
  .nav-item {
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px 0; cursor:pointer; transition:opacity 0.15s;
    border:none; background:none; color:var(--text3); font-family:inherit;
  }
  .nav-item.active { color:var(--red); }
  .nav-item svg { transition:transform 0.15s; }
  .nav-item.active svg { transform:scale(1.15); }
  .nav-item span { font-size:10px; font-weight:600; }

  /* ── MODAL / DETAIL ── */
  .overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    display:none; flex-direction:column;
    overflow:hidden;
  }
  .overlay.open { display:flex; }

  .detail-scroll { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  .detail-backdrop {
    width:100%; height:clamp(220px, 50vw, 300px);
    object-fit:cover; display:block;
    position:relative;
  }
  .detail-backdrop-wrap {
    position:relative;
    background:var(--surface);
  }
  .detail-backdrop-wrap::after {
    content:'';
    position:absolute; bottom:0; left:0; right:0; height:60%;
    background:linear-gradient(to top, #0A0A0F, transparent);
  }
  .detail-close {
    position:absolute; top:14px; left:14px; z-index:5;
    width:36px; height:36px; border-radius:50%;
    background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; backdrop-filter:blur(8px);
  }
  .detail-close svg { pointer-events:none; }

  .detail-body { padding:0 18px 30px; }
  .detail-title { font-size:24px; font-weight:900; letter-spacing:-0.5px; margin-bottom:8px; line-height:1.1; }
  .detail-meta {
    display:flex; align-items:center; gap:7px;
    font-size:12px; color:var(--text2); margin-bottom:14px; flex-wrap:wrap;
  }
  .meta-dot { width:3px; height:3px; border-radius:50%; background:var(--text3); }
  .meta-rating { color:var(--gold); font-weight:700; }
  .genre-tags { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .genre-tag {
    padding:4px 10px; border-radius:6px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1);
    font-size:11px; font-weight:600; color:var(--text2);
  }
  .detail-desc {
    font-size:13px; line-height:1.75; color:var(--text2);
    margin-bottom:20px;
  }
  .watch-now {
    width:100%; padding:14px; border-radius:12px;
    background:linear-gradient(135deg, #E50914, #B20710);
    color:#fff; border:none; font-family:inherit;
    font-size:15px; font-weight:800; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity 0.15s, transform 0.1s;
    letter-spacing:-0.2px; margin-bottom:10px;
    box-shadow:0 4px 20px rgba(229,9,20,0.3);
  }
  .watch-now:active { transform:scale(0.98); opacity:0.9; }
  .detail-note {
    text-align:center; font-size:11px; color:var(--text3);
    margin-bottom:24px;
  }

  /* PLAYER */
  .player-wrap {
    background:#000; border-radius:12px; overflow:hidden;
    margin-bottom:6px; border:1px solid var(--border);
    position:relative;
  }
  .player-wrap iframe {
    width:100%; aspect-ratio:16/9; border:none; display:block;
    background:#000;
  }
  .player-overlay-msg {
    padding:10px 0 0;
    font-size:11px; color:var(--text3); text-align:center;
  }
  .back-link {
    display:flex; align-items:center; gap:6px;
    color:var(--text2); font-size:13px; font-weight:500;
    cursor:pointer; margin-bottom:14px;
    background:none; border:none; font-family:inherit;
  }
  .back-link:active { color:var(--text); }

  /* SPLASH / LOADING OVERLAY */
  #splash {
    position:fixed; inset:0; background:var(--bg);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:999; gap:16px;
  }
  #splash .s-logo {
    font-size:32px; font-weight:900;
    background:linear-gradient(135deg,#E50914,#FF4D4D);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:-1px;
  }
  #splash .s-sub { font-size:13px; color:var(--text3); }
  #splash .s-bar {
    width:120px; height:3px; background:var(--surface2); border-radius:2px; overflow:hidden;
  }
  #splash .s-fill {
    height:100%; background:var(--red); border-radius:2px;
    animation: fillBar 1.4s ease forwards;
  }
  @keyframes fillBar { from{width:0} to{width:100%} }

  /* MISC */
  img { user-select:none; }
  button { -webkit-tap-highlight-color:transparent; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="s-logo">🎬 CineStream</div>
  <div class="s-bar"><div class="s-fill"></div></div>
  <div class="s-sub">Curated for you by <span style="color:#E50914;font-weight:700">Sakerur Afibe</span></div>
  <div style="margin-top:18px;font-size:10px;color:rgba(255,255,255,0.18);letter-spacing:1.5px;text-transform:uppercase">Designed &amp; Built by Sakerur Afibe</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

  <!-- NAV -->
  <nav class="nav">
    <div class="logo">Cine<span>Stream</span></div>
    <div class="search-bar">
      <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Search any movie…" autocomplete="off" autocorrect="off" spellcheck="false"/>
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </nav>

  <!-- SCROLL AREA -->
  <div id="scrollArea">

    <!-- HOME VIEW -->
    <div id="homeView">
      <!-- HERO -->
      <div class="hero" id="heroSection">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-badges">
          <div class="hero-badge hd">HD</div>
          <div class="hero-badge" id="heroBadgeRating"></div>
        </div>
        <div class="hero-dots" id="heroDots"></div>
        <div class="hero-info">
          <div class="hero-genre" id="heroGenre"></div>
          <div class="hero-title" id="heroTitle"></div>
          <div class="hero-meta">
            <span class="star-rating" id="heroRating"></span>
            <div class="dot"></div>
            <span id="heroYear"></span>
          </div>
          <div class="hero-btns">
            <button class="btn-play" id="heroPlayBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
              Watch Now
            </button>
            <button class="btn-info" id="heroInfoBtn">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- GENRE CHIPS -->
      <div class="section" style="padding-top:16px">
        <div class="genre-row" id="genreRow"></div>
      </div>

      <!-- TRENDING ROW -->
      <div class="section" id="trendingSection">
        <div class="section-head">
          <div class="section-title">🔥 Trending Now</div>
        </div>
        <div class="h-scroll" id="trendingRow"></div>
      </div>

      <!-- MOVIES GRID -->
      <div class="section" style="padding-top:20px">
        <div class="section-head">
          <div class="section-title" id="gridTitle">⭐ Top Rated</div>
        </div>
        <div class="movie-grid" id="movieGrid"></div>
      </div>
    </div>

    <!-- SEARCH RESULTS VIEW -->
    <div id="searchView">
      <div class="search-header" id="searchHeader">Searching…</div>
      <div class="movie-grid" id="searchGrid"></div>
    </div>

    <!-- FOOTER -->
    <div style="text-align:center;padding:28px 20px 8px;border-top:1px solid rgba(255,255,255,0.05);margin-top:8px;">
      <div style="font-size:11px;color:rgba(255,255,255,0.18);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px">Designed &amp; Developed by</div>
      <div style="font-size:15px;font-weight:800;background:linear-gradient(135deg,#E50914,#FF6B6B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-0.3px">Sakerur Afibe</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.12);margin-top:6px;letter-spacing:0.5px">CineStream © 2026</div>
    </div>
  </div><!-- /scrollArea -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="navHome" onclick="switchTab('home')">
      <svg width="22" height="22" fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </button>
    <button class="nav-item" id="navSearch" onclick="switchTab('search')">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <span>Search</span>
    </button>
    <button class="nav-item" id="navGenres" onclick="switchTab('genres')">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Genres</span>
    </button>
    <button class="nav-item" id="navTop" onclick="switchTab('top')">
      <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
      <span>Top Rated</span>
    </button>
  </nav>

</div><!-- /app -->

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay">
  <div class="detail-scroll" id="detailScroll">
    <div class="detail-backdrop-wrap">
      <img class="detail-backdrop" id="detailBackdrop" src="" alt=""/>
      <button class="detail-close" onclick="closeDetail()">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
    </div>
    <div class="detail-body">
      <!-- PLAYER (hidden until Watch pressed) -->
      <div id="playerSection" style="display:none; margin-bottom:18px;">
        <button class="back-link" onclick="hidePlayer()">
          <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
          Back to Info
        </button>
        <div class="player-wrap">
          <iframe id="playerFrame" src="" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
        <div class="player-overlay-msg">⏳  If the stream does not load, please wait a few seconds or refresh.</div>
      </div>

      <!-- INFO -->
      <div id="detailInfo">
        <div class="detail-title" id="detailTitle"></div>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="genre-tags" id="detailGenres"></div>
        <div class="detail-desc" id="detailDesc"></div>
        <button class="watch-now" id="watchNowBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Play Movie — Free
        </button>
        <div class="detail-note">Free to watch • No subscription required</div>
      </div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════
const TMDB_KEY   = '41244d5aff690ce95b8889c35ef14b6d';
const TMDB_IMG   = 'https://image.tmdb.org/t/p/';
const VIDSRC     = 'https://vidsrc.to/embed/movie/';

// ──────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────
let heroMovies   = [];
let heroIdx      = 0;
let heroTimer    = null;
let activeGenre  = 'All';
let currentMovie = null;
let searchTimer  = null;
let currentTab   = 'home';

const GENRES = [
  { label:'All',      id:null },
  { label:'Action',   id:28   },
  { label:'Comedy',   id:35   },
  { label:'Drama',    id:18   },
  { label:'Thriller', id:53   },
  { label:'Sci-Fi',   id:878  },
  { label:'Horror',   id:27   },
  { label:'Romance',  id:10749},
  { label:'Animation',id:16   },
  { label:'Crime',    id:80   },
  { label:'History',  id:36   },
];

// ══════════════════════════════════════════════
// TMDB HELPERS
// ══════════════════════════════════════════════
async function tmdb(path, params = {}) {
  const url = new URL(`https://api.themoviedb.org/3${path}`);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'en-US');
  for (const [k,v] of Object.entries(params)) url.searchParams.set(k, v);
  const res = await fetch(url.toString());
  if (!res.ok) throw new Error('TMDB error');
  return res.json();
}

function poster(path, size='w342') {
  return path ? `${TMDB_IMG}${size}${path}` : 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="300"><rect fill="%231A1A25" width="200" height="300"/><text x="50%" y="50%" fill="%23444" text-anchor="middle" font-family="sans-serif" font-size="14">No Image</text></svg>';
}
function backdrop(path) {
  return path ? `${TMDB_IMG}w1280${path}` : '';
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
async function init() {
  try {
    const [trending, toprated] = await Promise.all([
      tmdb('/trending/movie/week'),
      tmdb('/movie/top_rated', { page:1 })
    ]);

    heroMovies = trending.results.slice(0, 6);
    heroIdx = 0;
    renderHero();
    startHeroTimer();
    renderGenreChips();
    renderHScroll(trending.results.slice(0, 12));
    renderGrid(toprated.results.slice(0, 18), 'movieGrid');

    // Hide splash
    setTimeout(() => {
      document.getElementById('splash').style.opacity = '0';
      document.getElementById('splash').style.transition = 'opacity 0.4s';
      setTimeout(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
      }, 400);
    }, 1200);

  } catch(e) {
    console.error(e);
    document.getElementById('splash').innerHTML = '<div style="color:#E50914;font-size:14px;text-align:center;padding:20px">Unable to connect. Please check your internet connection and try again.</div>';
  }
}

// ══════════════════════════════════════════════
// HERO
// ══════════════════════════════════════════════
function renderHero() {
  if (!heroMovies.length) return;
  const m = heroMovies[heroIdx];
  const bg = backdrop(m.backdrop_path);

  document.getElementById('heroBg').style.backgroundImage = bg ? `url(${bg})` : '';
  document.getElementById('heroTitle').textContent = m.title || m.name || '';
  document.getElementById('heroRating').textContent = '⭐ ' + (m.vote_average||0).toFixed(1);
  document.getElementById('heroYear').textContent = (m.release_date||'').slice(0,4);
  document.getElementById('heroBadgeRating').textContent = '⭐ '+(m.vote_average||0).toFixed(1);
  document.getElementById('heroGenre').textContent = getGenreLabel(m.genre_ids);

  // Dots
  const dotsEl = document.getElementById('heroDots');
  dotsEl.innerHTML = heroMovies.map((_,i) =>
    `<div class="h-dot ${i===heroIdx?'active':''}" onclick="setHero(${i})"></div>`
  ).join('');

  document.getElementById('heroPlayBtn').onclick  = () => openDetail(m, true);
  document.getElementById('heroInfoBtn').onclick  = () => openDetail(m, false);
}

function setHero(i) {
  heroIdx = i;
  renderHero();
  clearInterval(heroTimer);
  startHeroTimer();
}
function startHeroTimer() {
  heroTimer = setInterval(() => {
    heroIdx = (heroIdx + 1) % heroMovies.length;
    renderHero();
  }, 5500);
}

function getGenreLabel(ids) {
  if (!ids || !ids.length) return '';
  const found = GENRES.find(g => g.id && ids.includes(g.id));
  return found ? found.label : '';
}

// ══════════════════════════════════════════════
// GENRE CHIPS
// ══════════════════════════════════════════════
function renderGenreChips() {
  const row = document.getElementById('genreRow');
  row.innerHTML = GENRES.map(g =>
    `<button class="chip ${g.label===activeGenre?'active':''}" onclick="selectGenre('${g.label}', ${g.id})">${g.label}</button>`
  ).join('');
}

async function selectGenre(label, genreId) {
  activeGenre = label;
  renderGenreChips();
  const grid = document.getElementById('movieGrid');
  const titleEl = document.getElementById('gridTitle');

  grid.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  titleEl.textContent = label === 'All' ? '⭐ Top Rated' : `🎭 ${label}`;

  try {
    const data = label === 'All'
      ? await tmdb('/movie/top_rated', { page:1 })
      : await tmdb('/discover/movie', { with_genres: genreId, sort_by:'vote_average.desc', 'vote_count.gte':500 });
    renderGrid(data.results.slice(0, 18), 'movieGrid');
  } catch(e) {
    grid.innerHTML = '<div class="empty-state"><p>Failed to load. Try again.</p></div>';
  }
}

// ══════════════════════════════════════════════
// RENDER CARDS
// ══════════════════════════════════════════════
function renderHScroll(movies) {
  const row = document.getElementById('trendingRow');
  row.innerHTML = movies.map(m => `
    <div class="h-card" onclick="openDetail(${encodeMovie(m)}, false)">
      <div class="h-card-img">
        <img src="${poster(m.poster_path)}" alt="${esc(m.title)}" loading="lazy"/>
        <div class="h-card-rating">⭐ ${(m.vote_average||0).toFixed(1)}</div>
      </div>
      <div class="h-card-title">${esc(m.title||m.name||'')}</div>
    </div>
  `).join('');
}

function renderGrid(movies, containerId) {
  const grid = document.getElementById(containerId);
  if (!movies || !movies.length) {
    grid.innerHTML = `<div class="empty-state">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <p>No results found</p>
    </div>`;
    return;
  }
  grid.innerHTML = movies.map(m => `
    <div class="g-card" onclick="openDetail(${encodeMovie(m)}, false)">
      <div class="g-card-img">
        <img src="${poster(m.poster_path)}" alt="${esc(m.title)}" loading="lazy"/>
        <div class="g-card-badge">⭐ ${(m.vote_average||0).toFixed(1)}</div>
      </div>
      <div class="g-card-title">${esc(m.title||m.name||'')}</div>
      <div class="g-card-year">${(m.release_date||'').slice(0,4)}</div>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim();
  document.getElementById('searchClear').style.display = q ? 'block' : 'none';
  clearTimeout(searchTimer);
  if (!q) {
    showHomeView();
    return;
  }
  showSearchView();
  document.getElementById('searchHeader').innerHTML = `Searching for <b>"${esc(q)}"</b>…`;
  document.getElementById('searchGrid').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  searchTimer = setTimeout(() => doSearch(q), 350);
});

async function doSearch(q) {
  try {
    const data = await tmdb('/search/movie', { query: q, include_adult: false });
    const results = data.results.filter(m => m.poster_path);
    document.getElementById('searchHeader').innerHTML =
      results.length
        ? `<b>${results.length}</b> results for "<b>${esc(q)}</b>"`
        : `No results for "<b>${esc(q)}</b>"`;
    renderGrid(results, 'searchGrid');
  } catch(e) {
    document.getElementById('searchGrid').innerHTML = '<div class="empty-state"><p>Search failed. Check connection.</p></div>';
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  showHomeView();
}

function showHomeView() {
  document.getElementById('homeView').style.display = 'block';
  document.getElementById('searchView').style.display = 'none';
}
function showSearchView() {
  document.getElementById('homeView').style.display = 'none';
  document.getElementById('searchView').style.display = 'block';
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
async function switchTab(tab) {
  currentTab = tab;
  ['Home','Search','Genres','Top'].forEach(n => {
    document.getElementById('nav'+n).classList.toggle('active', 'nav'+n === 'nav'+tab.charAt(0).toUpperCase()+tab.slice(1));
  });

  if (tab === 'home') {
    clearSearch();
    scrollTo('movieGrid', 'gridTitle', '⭐ Top Rated');
  } else if (tab === 'search') {
    document.getElementById('searchInput').focus();
    showSearchView();
    document.getElementById('searchHeader').textContent = 'Type to search any movie…';
    document.getElementById('searchGrid').innerHTML = '';
  } else if (tab === 'top') {
    clearSearch();
    document.getElementById('gridTitle').textContent = '🏆 Top Rated All Time';
    document.getElementById('movieGrid').innerHTML = '<div class="loader"><div class="spinner"></div></div>';
    const data = await tmdb('/movie/top_rated', { page:1 });
    renderGrid(data.results.slice(0, 21), 'movieGrid');
    document.getElementById('scrollArea').scrollTop = 400;
  } else if (tab === 'genres') {
    clearSearch();
    document.getElementById('scrollArea').scrollTop = document.getElementById('genreRow').offsetTop - 70;
  }
}

function scrollTo(gridId, titleId, titleText) {
  document.getElementById(titleId) && (document.getElementById(titleId).textContent = titleText);
}

// ══════════════════════════════════════════════
// DETAIL / MODAL
// ══════════════════════════════════════════════
async function openDetail(movie, autoPlay) {
  if (typeof movie === 'string') movie = JSON.parse(decodeURIComponent(movie));
  currentMovie = movie;

  document.getElementById('detailOverlay').classList.add('open');
  document.getElementById('detailScroll').scrollTop = 0;
  document.getElementById('playerSection').style.display = 'none';
  document.getElementById('detailInfo').style.display = 'block';
  document.getElementById('playerFrame').src = '';

  // Backdrop
  const bd = backdrop(movie.backdrop_path) || poster(movie.poster_path, 'w780');
  document.getElementById('detailBackdrop').src = bd;
  document.getElementById('detailTitle').textContent = movie.title || movie.name || '';
  document.getElementById('detailDesc').textContent = movie.overview || 'No description available.';
  document.getElementById('detailMeta').innerHTML = `
    <span class="meta-rating">⭐ ${(movie.vote_average||0).toFixed(1)}</span>
    <div class="meta-dot"></div>
    <span>${(movie.release_date||'').slice(0,4)}</span>
    <div class="meta-dot"></div>
    <span style="color:var(--red);font-weight:600">HD</span>
  `;

  // Genre tags
  const genreIds = movie.genre_ids || [];
  const tags = GENRES.filter(g => g.id && genreIds.includes(g.id)).map(g => g.label);
  document.getElementById('detailGenres').innerHTML =
    (tags.length ? tags : ['Movie']).map(t => `<div class="genre-tag">${t}</div>`).join('');

  document.getElementById('watchNowBtn').onclick = () => loadPlayer();

  if (autoPlay) loadPlayer();
}

function loadPlayer() {
  if (!currentMovie) return;
  document.getElementById('playerFrame').src = `${VIDSRC}${currentMovie.id}`;
  document.getElementById('playerSection').style.display = 'block';
  document.getElementById('detailInfo').style.display = 'none';
  document.getElementById('detailScroll').scrollTop = 0;
}

function hidePlayer() {
  document.getElementById('playerFrame').src = '';
  document.getElementById('playerSection').style.display = 'none';
  document.getElementById('detailInfo').style.display = 'block';
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.getElementById('playerFrame').src = '';
}

// Swipe to close detail
let touchStartY = 0;
document.getElementById('detailScroll').addEventListener('touchstart', e => {
  touchStartY = e.touches[0].clientY;
}, { passive:true });
document.getElementById('detailScroll').addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80 && document.getElementById('detailScroll').scrollTop === 0) closeDetail();
}, { passive:true });

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function encodeMovie(m) {
  return `'${encodeURIComponent(JSON.stringify(m))}'`;
}

// ══════════════════════════════════════════════
// START
// ══════════════════════════════════════════════
init();
</script>
</body>
</html>
